<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Statistik Evaluasi Model</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f7f6; padding: 40px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; max-width: 900px; margin: 30px auto; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .value { display: block; font-size: 2rem; font-weight: 600; color: #27ae60; }
        .label { color: #7f8c8d; font-size: 0.9rem; font-weight: 500; }
        .btn { text-decoration: none; color: #2c3e50; font-weight: 600; border: 1px solid #2c3e50; padding: 10px 20px; border-radius: 8px; }
    </style>
</head>
<body>
    <a href="/" class="btn">← Kembali</a>
    <h1>Performa Model Pisang Tanduk</h1>
    <div class="grid">
        <div class="card"><span class="value">{{ metrics.accuracy }}%</span><span class="label">Accuracy</span></div>
        <div class="card"><span class="value">{{ metrics.precision }}%</span><span class="label">Precision</span></div>
        <div class="card"><span class="value">{{ metrics.recall }}%</span><span class="label">Recall</span></div>
        <div class="card"><span class="value">{{ metrics.f1_score }}%</span><span class="label">F1-Score</span></div>
    </div>
</body>
</html>
