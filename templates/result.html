<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hasil Analisis Pisang Tanduk</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #27ae60;
            --warning: #e74c3c;
            --dark: #2c3e50;
            --bg: #f4f7f6;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--dark);
        }

        .result-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 95%;
            text-align: center;
        }

        /* --- KOTAK GAMBAR --- */
        .img-container {
            width: 100%;
            height: 250px;
            background-color: #f9f9f9;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: zoom-in; /* Menandakan bisa diklik untuk zoom */
        }

        .img-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        /* --- MODAL (TAMPILAN FULL SCREEN) --- */
        .modal {
            display: none; 
            position: fixed;
            z-index: 999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
            display: flex;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain; /* Menjamin gambar tidak crop saat full screen */
            border-radius: 5px;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- DESAIN TEKS --- */
        .status-box { padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .status-success { background-color: rgba(39, 174, 96, 0.1); border: 1px solid var(--primary); }
        .status-warning { background-color: rgba(231, 76, 60, 0.1); border: 1px solid var(--warning); }
        .label { display: block; font-size: 0.85rem; color: #7f8c8d; }
        .value { font-size: 1.3rem; font-weight: 600; display: block; }
        .success-text { color: var(--primary); }
        .warning-text { color: var(--warning); }
        .btn-retry {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 25px;
            background-color: var(--dark);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="result-card">
        <h1>Hasil Analisis Citra</h1>
        
        <div class="img-container" onclick="openModal()">
            <img src="{{ url_for('static', filename='uploads/' + image_path) }}" alt="Hasil Prediksi">
        </div>

        {% if prediction == 'Bukan Pisang Tanduk' %}
            <div class="status-box status-warning">
                <span class="label">Status Deteksi</span>
                <span class="value warning-text">Bukan Pisang Tanduk</span>
            </div>
        {% else %}
            <div class="status-box status-success">
                <span class="label">Prediksi Kematangan</span>
                <span class="value success-text">{{ prediction }}</span>
            </div>
            <p style="font-size: 0.85rem;">Tingkat Akurasi: <b>{{ confidence }}%</b></p>
        {% endif %}

        <br>
        <a href="/" class="btn-retry">Coba Lagi</a>
    </div>

    <div id="imageModal" class="modal" onclick="closeModal()">
        <span class="close-btn">&times;</span>
        <img class="modal-content" src="{{ url_for('static', filename='uploads/' + image_path) }}">
    </div>

    <script>
        function openModal() {
            document.getElementById("imageModal").classList.add("active");
        }

        function closeModal() {
            document.getElementById("imageModal").classList.remove("active");
        }

        // Tutup dengan tombol Esc
        document.addEventListener('keydown', function(e) {
            if (e.key === "Escape") closeModal();
        });
    </script>

</body>
</html>
